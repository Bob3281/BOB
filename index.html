<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAAAAAAAAH</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { 
            width: 100%; height: 100%; 
            font-family: 'Arial', sans-serif; 
            background-color: #ffffff; 
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }
        .slide {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%; height: 100%;
            text-align: center;
            padding: 20px;
            position: absolute;
            top: 0; left: 0;
        }
        .active { display: flex; }
        
        h1 { font-size: 2.5rem; color: #ff6600; margin-bottom: 30px; user-select: none; }
        
        .btn-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
            position: relative;
            width: 100%; height: 150px;
        }
        button {
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .btn-yes { background-color: #ff6600; color: white; position: relative; }
        .btn-no { background-color: #ff6600; color: white; z-index: 10; }
        
        .grid-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            max-width: 500px;
            width: 100%;
        }
        .grid-options button { position: static; width: 100%; }
        .fade-out { display: none !important; }
        
        /* 4ο κουμπί: Αρχικά κρυφό, κεντραρισμένο και bold */
        #btnFrygania { 
            display: none; 
            grid-column: span 2; 
            justify-self: center; 
            font-weight: 900 !important; 
            width: auto !important; 
            padding: 15px 60px;
        }
        
        .clickable-screen { cursor: pointer; }
        
        /* Slide 5 με θερμότερο τόνο μπλε (#1a5276) */
        #slide5 {
            background-color: #1a5276 !important;
            background-image: url('ΑΟΤ ΦΡΥΓΑΝΙΑ (2).png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            width: 100vw !important;
            height: 100vh !important;
            max-width: 100vw !important;
            max-height: 100vh !important;
        }

        #slide5 h1 {
            background: rgba(255, 255, 255, 0.8);
            padding: 20px;
            border-radius: 15px;
        }
        img { max-width: 80%; max-height: 60vh; border-radius: 15px; margin-top: 20px; }
    </style>
</head>
<body>

    <!-- SLIDE 1: The Request -->
    <div id="slide1" class="slide active">
        <h1>ΔΕΝ ΕΧΩ ΙΔΕΑ ΑΠΛΑ ΠΑΤΑ ΝΑΙ</h1>
        <div class="btn-container" id="container1">
            <button class="btn-yes" id="btnYes">ΝΑΙ</button>
            <button class="btn-no" onclick="nextSlide(2)">ΟΧΙ</button>
        </div>
    </div>

    <!-- SLIDE 2: Why Click No -->
    <div id="slide2" class="slide clickable-screen" onclick="nextSlide(3)">
        <h1>ΓΙΑΤΙ ΠΑΤΗΣΕΣ ΟΧΙ :(</h1>
    </div>

    <!-- SLIDE 3: Custom GIF -->
    <div id="slide3" class="slide clickable-screen" onclick="nextSlide(4)">
        <h1>.</h1>
        <img src="https://giphy.com" alt="Your GIF">
    </div>

    <!-- SLIDE 4: How Are You? -->
    <div id="slide4" class="slide">
        <h1>ΠΩΣ ΕΙΣΑΙ;</h1>
        <div class="grid-options">
            <button class="opt-btn" onclick="disappear(this)">ΚΑΛΑ</button>
            <button class="opt-btn" onclick="disappear(this)">ΠΟΛΥ ΚΑΛΑ</button>
            <button class="opt-btn" onclick="disappear(this)">ΕΞΑΙΡΕΤΑ</button>
            <button id="btnFrygania" onclick="goToFinalSlide()">ΦΡΥΓΑΝΙΑ</button>
        </div>
    </div>

    <!-- SLIDE 5: The Grand Finale (Background + Music) -->
    <div id="slide5" class="slide">
        <audio id="bgMusic" loop>
            <source src="IC3PEAK, ZillaKami - TRRST (SPOTISAVER).mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        const btnYes = document.getElementById('btnYes');
        const container1 = document.getElementById('container1');
        let clickedCount = 0;

        function teleportYes() {
            const containerWidth = container1.clientWidth;
            const containerHeight = container1.clientHeight;
            const btnWidth = btnYes.clientWidth;
            const btnHeight = btnYes.clientHeight;

            const randomX = Math.floor(Math.random() * (containerWidth - btnWidth));
            const randomY = Math.floor(Math.random() * (containerHeight - btnHeight));

            btnYes.style.left = randomX + 'px';
            btnYes.style.top = randomY + 'px';
        }

        btnYes.addEventListener('mouseover', teleportYes);
        btnYes.addEventListener('touchstart', function(e) {
            e.preventDefault();
            teleportYes();
        });

        function nextSlide(slideNumber) {
            document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
            document.getElementById('slide' + slideNumber).classList.add('active');
        }

        function disappear(element) {
            element.classList.add('fade-out');
            clickedCount++;
            
            if (clickedCount === 3) {
                document.getElementById('btnFrygania').style.display = 'block';
            }
        }

        function goToFinalSlide() {
            nextSlide(5);
            
            setTimeout(function() {
                const music = document.getElementById('bgMusic');
                music.play().catch(error => {
                    console.log("Audio autoplay restriction hit. Interaction required.");
                });
            }, 4000);
        }
    </script>
</body>   
</html>
